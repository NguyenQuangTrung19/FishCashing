name: Build Windows
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    name: Build Windows Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create ZIP
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "FishCash-POS-Windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: fishcash-windows
          path: FishCash-POS-Windows.zip
          retention-days: 30

      # Auto-create GitHub Release with ZIP when tag is pushed
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: FishCash-POS-Windows.zip
          generate_release_notes: true
          name: "FishCash POS ${{ github.ref_name }}"

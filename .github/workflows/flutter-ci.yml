name: Flutter CI
on:
  push:
    branches: [main]
    paths-ignore: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    branches: [main]
    paths-ignore: ['backend/**', '.github/workflows/backend-ci.yml']

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: dart analyze --fatal-infos

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APK
    needs: analyze-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: fishcash-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

# Render.com Blueprint — FishCash POS Backend
# Database hosted externally on Neon.tech (free tier, permanent)
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    plan: free
    name: fishcash-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 365d
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        sync: false  # Set manually via Render dashboard (Neon.tech connection string)

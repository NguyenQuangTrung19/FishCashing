version: '3.8'

services:
  # ── PostgreSQL Database ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fishcash-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-fishcash_prod}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_DATABASE:-fishcash_pos}
    volumes:
      - fishcash_pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-fishcash_prod} -d ${DB_DATABASE:-fishcash_pos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API Server ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fishcash-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    # Port exposed only to nginx, not to host
    expose:
      - "3000"

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fishcash-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - backend

volumes:
  fishcash_pgdata:

networks:
  backend:
    driver: bridge

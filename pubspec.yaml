name: fishcash_pos
description: "FishCash POS - Seafood Store Management"
publish_to: 'none'
version: 1.2.0+260318

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_adaptive_scaffold: ^0.3.1

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Database (Drift + SQLite)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utils
  decimal: ^3.2.1
  intl: ^0.20.2
  uuid: ^4.5.1

  # PDF
  pdf: ^3.11.2
  printing: ^5.14.1
  file_picker: ^8.3.7

  # Charts
  fl_chart: ^0.70.2
  http: ^1.6.0
  shared_preferences: ^2.5.4
  connectivity_plus: ^7.0.0
  socket_io_client: ^3.1.4
  archive: ^4.0.9
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # Code generation
  drift_dev: ^2.25.0
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#023E8A"
  image: assets/images/logo_icon.png
  android: true
  ios: true
  web: false


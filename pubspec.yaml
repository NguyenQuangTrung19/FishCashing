name: fishcash_pos
description: "FishCash POS - Seafood Store Management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_adaptive_scaffold: ^0.3.1

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Database (Drift + SQLite)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utils
  decimal: ^3.2.1
  intl: ^0.20.2
  uuid: ^4.5.1

  # PDF
  pdf: ^3.11.2
  printing: ^5.14.1
  file_picker: ^8.3.7

  # Charts
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  drift_dev: ^2.25.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/images/
